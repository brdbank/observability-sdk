server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: services
    static_configs:
      - targets: [localhost]
        labels:
          __path__: /var/log/pm2/*-out.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            service_name: service_name
            trace_id: trace_id
            span_id: span_id
      - labels:
          level:
          service_name:
      - timestamp:
          source: time
          format: RFC3339
